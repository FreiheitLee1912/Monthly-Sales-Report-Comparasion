<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ result.title }}</title>
  <style>
    :root {
      --bg: #f7f8f9;
      --panel: #ffffff;
      --ink: #172b4d;
      --text: #44546f;
      --muted: #626f86;
      --line: #dcdfe4;
      --accent: #0c66e4;
      --accent-hover: #0055cc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 14px;
    }

    main {
      width: min(920px, calc(100vw - 40px));
      margin: 28px auto 48px;
    }

    .page-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: 0 1px 2px rgba(9, 30, 66, 0.08);
      overflow: hidden;
    }

    .page-head {
      padding: 30px 32px 26px;
      border-bottom: 1px solid var(--line);
    }

    .product-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 20px;
      padding: 0 8px;
      border-radius: 3px;
      background: #f1f2f4;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: 26px;
      line-height: 1.3;
      font-weight: 650;
    }

    .lead {
      max-width: 720px;
      margin: 10px 0 0;
      color: var(--text);
      line-height: 1.75;
    }

    .section {
      padding: 24px 32px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child { border-bottom: 0; }

    .download-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .download-card {
      min-height: 132px;
      display: grid;
      align-content: start;
      gap: 12px;
      padding: 18px;
      border: 1px dashed #b6c2cf;
      border-radius: 6px;
      background: #fbfcfe;
    }

    .download-card strong {
      font-size: 16px;
      font-weight: 650;
    }

    .download-card small {
      color: var(--muted);
      line-height: 1.55;
    }

    .download,
    .back {
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border: 0;
      border-radius: 3px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }

    .download:hover,
    .back:hover { background: var(--accent-hover); }

    .back {
      background: #f1f2f4;
      color: var(--ink);
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    @media (max-width: 820px) {
      main { width: min(100vw - 24px, 720px); }

      .page-head,
      .section {
        padding-left: 20px;
        padding-right: 20px;
      }

      .download-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="page-card">
      <section class="page-head">
        <div class="product-row">
          <div class="logo-mark">S</div>
          <strong>SalesPlan Compare</strong>
          <span class="badge">ONLINE</span>
        </div>
        <h1>{{ result.title }}</h1>
        <p class="lead">レポートファイルを作成しました。必要な形式を選択してダウンロードしてください。</p>
      </section>

      <section class="section">
        <div class="download-grid">
          <div class="download-card">
            <strong>report.xlsx</strong>
            <small>Excelで編集できるレポートファイルです。</small>
            <a class="download" href="/download/{{ result.job_id }}/report.xlsx">ダウンロード</a>
          </div>
          <div class="download-card">
            <strong>report.html</strong>
            <small>ブラウザで確認できるHTMLレポートです。</small>
            <a class="download" href="/download/{{ result.job_id }}/report.html">ダウンロード</a>
          </div>
          <div class="download-card">
            <strong>report.pdf</strong>
            <small>共有や印刷に使いやすいPDFレポートです。</small>
            <a class="download" href="/download/{{ result.job_id }}/report.pdf">ダウンロード</a>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="actions">
          <a class="back" href="/">別のレポートを生成</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
